name: QEA PRIME SOTA OBSERVER
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  observe_and_react:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pull Gist Beacon
        run: |
          curl -sL https://gist.githubusercontent.com/TheNeuralVault/ff96e3c74a48554383d239fd29fa0441/raw/qea_prime_directive.json -o directive.json

      - name: SOTA Score Gate
        id: gate
        run: |
          MAX_SCORE=$(jq '[.tier1[].tier_score] | max' directive.json)
          if (( $(echo "$MAX_SCORE > 0.90" | bc -l) )); then
            echo "MATCH=true" >> $GITHUB_OUTPUT
          else
            echo "MATCH=false" >> $GITHUB_OUTPUT
          fi

      - name: Execute ARM64 JS-Engine Hardening
        if: steps.gate.outputs.MATCH == 'true'
        run: |
          echo "RAISING THE BAR: Installing ARM64 Cross-Compiler..."
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          
          echo "Cloning QuickJS..."
          git clone https://github.com/bellard/quickjs.git
          cd quickjs
          
          echo "COMPILING FOR ARM64 (SOTA Target)..."
          # We explicitly tell 'make' to use the ARM64 compiler
          make -j$(nproc) CROSS_PREFIX=aarch64-linux-gnu-
          
          echo "VERIFYING BINARY ARCHITECTURE..."
          file qjs

      - name: Upload Hardened ARM64 Engine
        if: steps.gate.outputs.MATCH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hardened-qjs-arm64
          path: quickjs/qjs
